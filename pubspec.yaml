name: fault_reporting_app
description: Fault Reporting Mobile App - Hawassa University IoT Campus
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  
  # Image picker (camera & gallery)
  image_picker: ^1.1.2
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # HTTP
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  cloud_functions: ^5.6.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
