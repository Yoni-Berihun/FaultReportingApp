name: fault_reporting_app
description: Fault Reporting Mobile App - Hawassa University IoT Campus
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  
  # Image picker (camera & gallery)
  image_picker: ^1.1.2
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # HTTP
  http: ^1.2.0

  # Supabase
  supabase_flutter: ^2.0.0

  # Local database (fixer cache) — keep compatible with SDK 3.4.x
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4

  # Connectivity, background, notifications
  connectivity_plus: ^6.0.0
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.2.0

  # UI
  cupertino_icons: ^1.0.8

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
